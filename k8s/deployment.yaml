# nginx-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-app-deployment
  annotations:
    kubernetes.io/change-cause: "Deploy ghcr.io/mercyshark/demoapp:sha-18c16eb"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-app
  template:
    metadata:
      labels:
        app: backend-app
    spec:
      containers:
      - name: backend-app
        image: ghcr.io/mercyshark/demoapp:sha-18c16eb
        ports:
        - containerPort: 8000


---
apiVersion: v1
kind: Service
metadata:
  name: backend-app-service
spec:
  selector:
    app: backend-app
  ports:
  - port: 8000
    targetPort: 8000
